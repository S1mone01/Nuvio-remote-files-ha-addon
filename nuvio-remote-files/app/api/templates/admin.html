<!DOCTYPE html>
<html>
<head>
    <title>Remote Files – Admin</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        label {
            font-weight: 600;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 14px;
            margin-right: 10px;
            font-weight: 600;
            border-radius: 4px;
            border: none;
            cursor: pointer;
        }

        button.primary {
            background: #2563eb;
            color: white;
        }

        button.danger {
            background: #dc2626;
            color: white;
        }

        pre {
            background: #f1f5f9;
            color: #0f172a;
            padding: 12px;
            border-radius: 4px;
            margin-top: 20px;
            min-height: 60px;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 10px;
            padding: 2px 8px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            vertical-align: middle;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-online { background-color: #16a34a; }
        .status-offline { background-color: #dc2626; }
        .status-text-online { color: #16a34a; }
        .status-text-offline { color: #dc2626; }

    </style>
</head>
<body>
<div class="container">
    <h1>Remote Files Admin
        <div class="status-indicator" id="disk-status-container">
            <div class="status-dot {% if disk_status.online %}status-online{% else %}status-offline{% endif %}"></div>
            <span class="{% if disk_status.online %}status-text-online{% else %}status-text-offline{% endif %}">
                {% if disk_status.online %}online{% else %}offline{% endif %}
            </span>
            <span style="font-size: 0.65rem; color: #64748b; border-left: 1px solid #e2e8f0; padding-left: 8px; margin-left: 8px; margin-right: 8px; text-transform: none;">
                Ultimo check: {{ disk_status.last_check }}
            </span>
            <button onclick="checkDiskNow()" class="primary" style="padding: 2px 8px; font-size: 0.6rem; margin-right: 0;">Controlla</button>
        </div>
    </h1>

    <label>Admin Scan Token</label>
    <input id="token" type="password" placeholder="Bearer token" />

    <button type="button" class="primary" onclick="scan()">Scan Library</button>
    <button type="button" class="danger" onclick="rebuild()">Full Rebuild</button>
    <button type="button" class="danger" style="background: #991b1b;" onclick="reset()">Reset & Scan</button>

    <pre id="output"></pre>
</div>

<script>
async function checkDiskNow() {
    const btn = document.querySelector('#disk-status-container button');
    const originalText = btn.textContent;
    btn.textContent = '...';
    btn.disabled = true;
    
    try {
        const res = await fetch("{{ request.headers.get('X-Ingress-Path', '') }}/api/check_disk", { method: 'POST' });
        window.location.reload();
    } catch (e) {
        alert("Errore durante il controllo disco: " + e.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

async function scan() {
    await call("/admin/scan");
}

async function rebuild() {
    if (!confirm("This will clear the database. Continue?")) return;
    await call("/admin/scan/rebuild");
}

async function reset() {
    if (!confirm("This will completely reset the database and start a fresh scan. Continue?")) return;
    await call("/admin/scan/rebuild");
}

async function call(path) {
    const token = document.getElementById("token").value;
    const res = await fetch("{{ request.headers.get('X-Ingress-Path', '') }}" + path, {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token
        }
    });
    const text = await res.text();
    document.getElementById("output").textContent = text;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Remote Files – Install</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            font-family: monospace;
            padding: 10px;
        }

        button {
            padding: 8px 14px;
            font-weight: 600;
            border-radius: 4px;
            border: none;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        .note {
            color: #475569;
            font-size: 0.9em;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-left: 10px;
            padding: 2px 8px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            vertical-align: middle;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-online { background-color: #16a34a; }
        .status-offline { background-color: #dc2626; }
        .status-text-online { color: #16a34a; }
        .status-text-offline { color: #dc2626; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: white; padding: 24px; border-radius: 8px;
            max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal-header { font-weight: 700; margin-bottom: 12px; font-size: 1.1rem; }
        .modal-body { color: #475569; margin-bottom: 20px; font-size: 0.95rem; }
        .modal-footer { display: flex; justify-content: flex-end; }
    </style>
</head>
<body>
<div class="container">
    <h1>Install Remote Files Addon
        <div class="status-indicator" id="disk-status-container">
            <div class="status-dot {% if disk_status.online %}status-online{% else %}status-offline{% endif %}"></div>
            <span class="{% if disk_status.online %}status-text-online{% else %}status-text-offline{% endif %}">
                {% if disk_status.online %}online{% else %}offline{% endif %}
            </span>
            <span style="font-size: 0.65rem; color: #64748b; border-left: 1px solid #e2e8f0; padding-left: 8px; margin-left: 8px; margin-right: 8px; text-transform: none;">
                Ultimo check: {{ disk_status.last_check }}
            </span>
            <button onclick="checkDiskNow()" style="padding: 2px 8px; font-size: 0.6rem;">Controlla</button>
        </div>
    </h1>

    <p class="note">This page generates a Stremio addon install link.</p>

    <label>Addon Base URL</label>
    <input id="base">

    <div id="token-block" style="display:none">
        <label>Stream Token</label>
        <input id="token" type="password">
    </div>

    <button type="button" onclick="install()">Install Addon</button>

    <h3>Manifest URL</h3>
    <textarea id="manifest" rows="3" readonly></textarea>
</div>

<!-- Alert Modal -->
<div class="modal-overlay" id="alert-modal-overlay">
    <div class="modal">
        <div class="modal-header" id="alert-title">Notifica</div>
        <div class="modal-body" id="alert-message"></div>
        <div class="modal-footer">
            <button onclick="closeAlert()">Chiudi</button>
        </div>
    </div>
</div>

<script>
const path = window.location.pathname;
const mode = path.includes("/external") ? "external" : "internal";
const isExternal = mode === "external";

const baseInput = document.getElementById("base");
const base_path = "{{ request.headers.get('X-Ingress-Path', '') }}";
baseInput.value = window.location.origin + base_path;

async function checkDiskNow() {
    const btn = document.querySelector('#disk-status-container button');
    const originalText = btn.textContent;
    btn.textContent = '...';
    btn.disabled = true;
    
    try {
        const res = await fetch(base_path + "/api/check_disk", { method: 'POST' });
        window.location.reload();
    } catch (e) {
        showAlert("Errore durante il controllo disco: " + e.message);
        btn.textContent = originalText;
        btn.disabled = false;
    }
}

if (isExternal) {
    document.getElementById("token-block").style.display = "block";
}

function showAlert(message, title = "Attenzione") {
    document.getElementById('alert-title').textContent = title;
    document.getElementById('alert-message').textContent = message;
    document.getElementById('alert-modal-overlay').style.display = 'flex';
}

function closeAlert() {
    document.getElementById('alert-modal-overlay').style.display = 'none';
}

function install() {
    let base = baseInput.value.trim();

    if (!base.startsWith("http://") && !base.startsWith("https://")) {
        showAlert("Base URL must start with http:// or https://");
        return;
    }

    base = base.replace(/\/$/, "");

    let manifestUrl = `${base}/${mode}/manifest.json`;

    if (isExternal) {
        const token = document.getElementById("token").value.trim();
        if (!token) {
            showAlert("Token is required for external access");
            return;
        }
        manifestUrl += `?token=${encodeURIComponent(token)}`;
    }

    document.getElementById("manifest").value = manifestUrl;
    window.location.href = `stremio://${manifestUrl}`;
}
</script>
</body>
</html>
